services:
  postgres:
    image: postgres:17-alpine
    container_name: socialqueue-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: socialqueue
      POSTGRES_PASSWORD: socialqueue
      POSTGRES_DB: socialqueue
    ports:
      - "5432:5432"
    volumes:
      - socialqueue_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: socialqueue-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - socialqueue_redis_data:/data

volumes:
  socialqueue_postgres_data:
  socialqueue_redis_data: